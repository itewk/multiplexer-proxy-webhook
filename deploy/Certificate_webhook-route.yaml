apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: webhook-route
spec:
  secretName: webhook-route-tls
  issuerRef:
    name: local-trusted-issuer
    kind: ClusterIssuer
  commonName: multiplexer-proxy-webhook
  dnsNames:
  - multiplexer-proxy-webhook.apps.sno-auth-testing.lab.rh-itewk.internal
  - multiplexer-proxy-webhook.multiplexer-proxy-webhook.svc
